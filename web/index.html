<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>会议助手</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="kicker">本地会议处理</p>
          <h1>会议助手</h1>
        </div>
        <button id="refreshButton" class="icon-button" type="button" title="刷新文件列表">↻</button>
      </header>

      <section class="upload-panel" aria-labelledby="uploadTitle">
        <div>
          <h2 id="uploadTitle">音频上传</h2>
          <p>支持 m4a、mp3、wav、flac。文件保存在本机 data/audio，不会进入 Git。</p>
        </div>
        <form id="uploadForm" class="upload-form">
          <input id="audioInput" type="file" accept=".m4a,.mp3,.wav,.flac,audio/*" />
          <button type="submit">上传音频</button>
        </form>
        <p id="uploadStatus" class="status-line" role="status"></p>
      </section>

      <section class="workbench" aria-label="音频转换工作台">
        <div class="queue-panel">
          <div class="section-heading">
            <h2>音频队列</h2>
            <span id="audioCount">0</span>
          </div>
          <div id="audioList" class="file-list"></div>
        </div>

        <div class="progress-panel">
          <div class="section-heading">
            <h2>转换进展</h2>
            <span id="activeMeeting">未选择音频</span>
          </div>
          <div id="progressCard" class="progress-card is-idle">
            <div class="status-row">
              <strong id="jobState">等待开始</strong>
              <span id="jobStep">请选择一个音频文件</span>
            </div>
            <div class="progress-track" aria-label="转换进度">
              <div id="progressFill" class="progress-fill"></div>
            </div>
            <p id="jobMessage">上传或选择音频后，点击“开始转写”。</p>
            <ol class="steps">
              <li id="stepQueued">创建任务</li>
              <li id="stepModel">加载模型</li>
              <li id="stepTranscribe">语音识别</li>
              <li id="stepWrite">写入转写稿</li>
              <li id="stepDone">完成</li>
            </ol>
          </div>
        </div>
      </section>

      <section class="preview" aria-labelledby="previewTitle">
        <div class="section-heading">
          <h2 id="previewTitle">转换结果</h2>
          <div class="result-actions">
            <span id="previewMeta">未选择文件</span>
            <button id="cleanTranscriptButton" class="text-button" type="button">整理记录</button>
            <button id="reloadResultButton" class="text-button" type="button">刷新结果</button>
          </div>
        </div>
        <pre id="previewContent">选择转写稿或内容提要后在这里查看。</pre>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
